  <body>
    <div id="root"></div>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var redirectPath = params.get('p');
        if (redirectPath) {
          var cleanPath = redirectPath.startsWith('/') ? redirectPath : '/' + redirectPath;
          var query = params.get('q');
          var fullUrl = cleanPath + (query ? '?' + query.replace(/~and~/g, '&') : '') + window.location.hash;
          window.history.replaceState({}, '', fullUrl);
        }
      })();
    </script>
