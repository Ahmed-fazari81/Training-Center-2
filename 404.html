<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8">
    <title>مركز التدريب</title>
    <script>
      // =============================================================================
      // SPA Redirect Trick for GitHub Pages
      // -----------------------------------------------------------------------------
      // When a user hard-refreshes (Ctrl+F5) a client-side route like
      //   https://ahmed-fazari81.github.io/Training-Center/employee
      // GitHub Pages cannot find a physical file at that path and returns 404.
      // This 404.html intercepts that response, converts the path into a query
      // parameter (?p=/employee), and redirects to the repo's index.html.
      // index.html then reads ?p= and restores the route via history.replaceState.
      //
      // segmentCount = 1 means the site is served under ONE subpath (/Training-Center/).
      // If you later deploy at the user/organization root, change segmentCount to 0.
      // =============================================================================
      var segmentCount = 1;
      var l = window.location;
      var redirect =
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash;
      l.replace(redirect);
    </script>
  </head>
  <body>
    <p style="font-family: sans-serif; text-align: center; padding: 2rem;">
      جارٍ التحويل... إذا لم يتم تحويلك تلقائياً،
      <a href="./">اضغط هنا للمتابعة</a>.
    </p>
  </body>
</html>
